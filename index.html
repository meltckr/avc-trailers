<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fearless Moon Trailers — Authentic Movie Trailers</title>
<meta property="og:title" content="Fearless Moon Trailers">
<meta property="og:description" content="Authentic movie trailers only. By genre, newest to oldest. No fan-made fakes.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://avc-trailers.netlify.app/">
<meta property="og:image" content="https://avc-trailers.netlify.app/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://avc-trailers.netlify.app/og.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#070b18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fearless Moon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b18;
    --bg-2: #0d1326;
    --card: rgba(21, 29, 56, 0.55);
    --card-solid: #141c37;
    --border: rgba(122, 168, 255, 0.14);
    --border-strong: rgba(122, 168, 255, 0.35);
    --text: #edf1fa;
    --muted: #8b95b5;
    --accent: #4f8cff;
    --accent-2: #7aa8ff;
    --glow: rgba(79, 140, 255, 0.35);
    --danger: #ff6b6b;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Night sky: stars + moonlight glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,255,255,0.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 28% 8%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(2px 2px at 44% 32%, rgba(199,208,232,0.35) 50%, transparent 51%),
      radial-gradient(1px 1px at 61% 15%, rgba(255,255,255,0.45) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 74% 41%, rgba(255,255,255,0.3) 50%, transparent 51%),
      radial-gradient(1px 1px at 88% 9%, rgba(255,255,255,0.5) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 8% 64%, rgba(199,208,232,0.3) 50%, transparent 51%),
      radial-gradient(1px 1px at 33% 79%, rgba(255,255,255,0.28) 50%, transparent 51%),
      radial-gradient(2px 2px at 56% 60%, rgba(255,255,255,0.22) 50%, transparent 51%),
      radial-gradient(1px 1px at 79% 72%, rgba(199,208,232,0.35) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 93% 55%, rgba(255,255,255,0.3) 50%, transparent 51%),
      radial-gradient(1px 1px at 18% 92%, rgba(255,255,255,0.3) 50%, transparent 51%),
      radial-gradient(1200px 700px at 88% -12%, rgba(79,140,255,0.16), transparent 65%),
      radial-gradient(900px 600px at -10% 108%, rgba(47,95,208,0.10), transparent 60%);
  }

  /* Decorative crescent in the sky */
  .moon-decor {
    position: fixed;
    top: -60px;
    right: -70px;
    width: 340px;
    height: 340px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.1;
    filter: drop-shadow(0 0 60px var(--glow));
  }

  header, main, footer { position: relative; z-index: 1; }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(7, 11, 24, 0.75);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    border-bottom: 1px solid var(--border);
    padding-top: env(safe-area-inset-top);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 40px; height: 40px;
    border-radius: 13px;
    background: linear-gradient(135deg, #7aa8ff, #2f5fd0);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 22px var(--glow), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .title-block { line-height: 1.15; }
  .title-block h1 {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(90deg, #ffffff 0%, #b9ccf5 60%, #7aa8ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .title-block .sub { font-size: 11.5px; color: var(--muted); font-weight: 500; margin-top: 2px; }

  .genres {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 20px 14px;
    max-width: 1200px;
    margin: 0 auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .genres::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .chip:hover { color: var(--text); border-color: var(--border-strong); transform: translateY(-1px); }
  .chip.active {
    background: linear-gradient(135deg, #4f8cff, #2f5fd0);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 18px var(--glow);
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 22px 20px 10px;
  }
  .sort-note {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .sort-note svg { flex-shrink: 0; opacity: 0.8; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }
  @media (min-width: 700px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 20px; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: rise 0.45s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--border-strong);
    box-shadow: 0 12px 36px rgba(0,0,0,0.45), 0 0 24px rgba(79,140,255,0.12);
  }
  .poster-wrap { position: relative; aspect-ratio: 2 / 3; background: var(--bg-2); overflow: hidden; }
  .poster-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  .card:hover .poster-wrap img { transform: scale(1.06); }
  .poster-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(7,11,24,0.55) 0%, transparent 30%);
    pointer-events: none;
  }
  .poster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px; font-weight: 600; text-align: center; padding: 12px;
  }
  .play-badge {
    position: absolute; bottom: 10px; right: 10px;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(7, 11, 24, 0.72);
    border: 1.5px solid rgba(122, 168, 255, 0.55);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 0 14px rgba(79,140,255,0.25);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    z-index: 1;
  }
  .card:hover .play-badge { transform: scale(1.1); box-shadow: 0 0 20px rgba(79,140,255,0.5); }
  .play-badge svg { width: 15px; height: 15px; fill: #fff; margin-left: 2px; }
  .card-info { padding: 11px 13px 13px; }
  .card-info .name {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 13.5px; font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
    letter-spacing: -0.1px;
  }
  .card-info .date { font-size: 11.5px; color: var(--muted); margin-top: 5px; font-weight: 500; }

  .load-more {
    display: block;
    margin: 28px auto 8px;
    background: var(--card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 13px 40px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .load-more:hover {
    border-color: var(--accent-2);
    box-shadow: 0 0 22px rgba(79,140,255,0.25);
    transform: translateY(-1px);
  }
  .load-more:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

  .status-msg {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 44px 20px;
    font-weight: 500;
  }
  .status-msg svg { display: block; margin: 0 auto 14px; opacity: 0.5; }

  /* Moon-phase loader */
  @keyframes moonspin { to { transform: rotate(360deg); } }
  @keyframes moonpulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .spinner {
    width: 34px; height: 34px;
    margin: 36px auto;
    border-radius: 50%;
    border: 3px solid rgba(122,168,255,0.15);
    border-top-color: var(--accent-2);
    border-right-color: var(--accent-2);
    animation: moonspin 0.9s linear infinite, moonpulse 1.8s ease infinite;
    box-shadow: 0 0 18px rgba(79,140,255,0.3), inset 0 0 10px rgba(79,140,255,0.15);
  }

  /* Trailer modal */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(4, 6, 14, 0.94);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal.open { display: flex; }
  .modal-content { width: 100%; max-width: 960px; animation: rise 0.3s ease both; }
  .modal-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
  }
  .modal-title {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 16px; font-weight: 700; line-height: 1.3;
    letter-spacing: -0.2px;
  }
  .modal-title .yr { color: var(--muted); font-weight: 500; }
  .close-btn {
    background: var(--card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    transition: all 0.2s ease;
  }
  .close-btn:hover { border-color: var(--accent-2); box-shadow: 0 0 14px rgba(79,140,255,0.3); }
  .video-frame {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border-strong);
    box-shadow: 0 0 60px rgba(79,140,255,0.18), 0 24px 60px rgba(0,0,0,0.6);
  }
  .video-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .official-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 11.5px;
    font-weight: 600;
    color: #6fd88f;
  }
  .official-tag svg { width: 13px; height: 13px; fill: #6fd88f; }

  footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11.5px;
    padding: 34px 16px calc(34px + env(safe-area-inset-bottom));
    font-weight: 500;
  }
  footer svg { opacity: 0.6; }
</style>
</head>
<body>

<svg class="moon-decor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="#7aa8ff"/></svg>

<header>
  <div class="header-inner">
    <div class="logo-mark"><svg viewBox="0 0 24 24" width="21" height="21"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="#fff"/></svg></div>
    <div class="title-block">
      <h1>Fearless Moon Trailers</h1>
      <div class="sub">Authentic trailers only &middot; newest to oldest</div>
    </div>
  </div>
  <nav class="genres" id="genreBar" style="display:none"></nav>
</header>

<main>
  <div id="appScreen">
    <div class="sort-note" id="sortNote"></div>
    <div class="grid" id="grid"></div>
    <div id="statusArea"></div>
    <button class="load-more" id="loadMore" style="display:none">Load more</button>
  </div>
</main>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-top">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" id="modalClose" aria-label="Close">&times;</button>
    </div>
    <div class="video-frame"><iframe id="ytFrame" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen title="Trailer"></iframe></div>
    <div class="official-tag">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.25 3.4 10.15 8 11.35C16.6 22.15 20 17.25 20 12V6l-8-4zm-1.2 14.5l-3.5-3.5 1.4-1.4 2.1 2.1 4.6-4.6 1.4 1.4-6 6z"/></svg>
      Official studio upload &middot; verified via TMDB
    </div>
  </div>
</div>

<footer>
  <svg viewBox="0 0 24 24" width="13" height="13"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="#8b95b5"/></svg>
  Fearless Moon Trailers &middot; Powered by TMDB
</footer>

<script>
(function () {
  var API = 'https://api.themoviedb.org/3';
  var IMG = 'https://image.tmdb.org/t/p/w342';
  var KEY_STORE = 'avc_tmdb_key';
  var DEFAULT_KEY = '7221cbd6fca6205f03042204792228dd';
  var MOON_SVG = '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="#7aa8ff"/></svg>';

  var GENRES = [
    { id: 0, name: 'All' },
    { id: 28, name: 'Action' },
    { id: 12, name: 'Adventure' },
    { id: 16, name: 'Animation' },
    { id: 35, name: 'Comedy' },
    { id: 80, name: 'Crime' },
    { id: 99, name: 'Documentary' },
    { id: 18, name: 'Drama' },
    { id: 10751, name: 'Family' },
    { id: 14, name: 'Fantasy' },
    { id: 36, name: 'History' },
    { id: 27, name: 'Horror' },
    { id: 10402, name: 'Music' },
    { id: 9648, name: 'Mystery' },
    { id: 10749, name: 'Romance' },
    { id: 878, name: 'Sci-Fi' },
    { id: 53, name: 'Thriller' },
    { id: 10752, name: 'War' },
    { id: 37, name: 'Western' }
  ];

  var state = {
    key: localStorage.getItem(KEY_STORE) || DEFAULT_KEY,
    genre: 0,
    page: 0,
    loading: false,
    done: false,
    shown: {} // movie ids already rendered
  };

  var el = function (id) { return document.getElementById(id); };

  function isBearer(key) { return key.length > 40; }

  function tmdb(path, params) {
    params = params || {};
    var qs = Object.keys(params).map(function (k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    });
    var opts = {};
    if (isBearer(state.key)) {
      opts.headers = { Authorization: 'Bearer ' + state.key };
    } else {
      qs.push('api_key=' + encodeURIComponent(state.key));
    }
    var url = API + path + (qs.length ? '?' + qs.join('&') : '');
    return fetch(url, opts).then(function (r) {
      if (!r.ok) throw new Error('TMDB ' + r.status);
      return r.json();
    });
  }

  function today() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  function fmtDate(s) {
    if (!s) return '';
    var parts = s.split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
  }

  // Pick the best authentic trailer: official Trailer > any YouTube Trailer > official Teaser
  function pickTrailer(videos) {
    var yt = videos.filter(function (v) { return v.site === 'YouTube' && v.key; });
    var pools = [
      yt.filter(function (v) { return v.type === 'Trailer' && v.official; }),
      yt.filter(function (v) { return v.type === 'Trailer'; }),
      yt.filter(function (v) { return v.type === 'Teaser' && v.official; })
    ];
    for (var i = 0; i < pools.length; i++) {
      if (pools[i].length) {
        pools[i].sort(function (a, b) { return (b.published_at || '').localeCompare(a.published_at || ''); });
        return pools[i][0];
      }
    }
    return null;
  }

  function setStatus(html) { el('statusArea').innerHTML = html; }

  function loadPage() {
    if (state.loading || state.done) return;
    state.loading = true;
    state.page += 1;
    el('loadMore').disabled = true;
    if (state.page === 1) setStatus('<div class="spinner"></div>');

    var params = {
      sort_by: 'primary_release_date.desc',
      'primary_release_date.lte': today(),
      'vote_count.gte': 10,
      include_adult: 'false',
      language: 'en-US',
      page: state.page
    };
    if (state.genre) params.with_genres = state.genre;

    tmdb('/discover/movie', params).then(function (data) {
      if (state.page >= (data.total_pages || 1)) state.done = true;
      var movies = (data.results || []).filter(function (m) { return !state.shown[m.id]; });

      // Fetch videos for all movies on this page in parallel; keep only ones with a real trailer
      return Promise.all(movies.map(function (m) {
        return tmdb('/movie/' + m.id + '/videos').then(function (v) {
          var t = pickTrailer(v.results || []);
          return t ? { movie: m, trailer: t } : null;
        }).catch(function () { return null; });
      }));
    }).then(function (results) {
      var found = results.filter(Boolean);
      found.forEach(function (r, i) {
        state.shown[r.movie.id] = true;
        renderCard(r.movie, r.trailer, i);
      });
      setStatus('');
      state.loading = false;
      el('loadMore').disabled = false;
      el('loadMore').style.display = state.done ? 'none' : 'block';

      var haveCards = el('grid').children.length > 0;
      if (!haveCards && state.done) {
        setStatus('<div class="status-msg"><svg viewBox="0 0 24 24" width="34" height="34"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="#8b95b5"/></svg>No trailers found for this genre.</div>');
      } else if (!haveCards && !state.done) {
        // Whole page filtered out — auto-advance
        loadPage();
      }
    }).catch(function (e) {
      state.loading = false;
      el('loadMore').disabled = false;
      if (String(e).indexOf('401') > -1) {
        localStorage.removeItem(KEY_STORE);
        setStatus('<div class="status-msg">TMDB rejected the API key. Reload the page to try again.</div>');
      } else {
        setStatus('<div class="status-msg">Couldn’t reach TMDB. Check connection and try again.</div>');
        el('loadMore').style.display = 'block';
        state.page -= 1;
      }
    });
  }

  function renderCard(m, trailer, i) {
    var card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (Math.min(i || 0, 14) * 40) + 'ms';
    var posterHtml = m.poster_path
      ? '<img loading="lazy" src="' + IMG + m.poster_path + '" alt="">'
      : '<div class="poster-fallback">' + escapeHtml(m.title) + '</div>';
    card.innerHTML =
      '<div class="poster-wrap">' + posterHtml +
      '<div class="play-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
      '<div class="card-info"><div class="name">' + escapeHtml(m.title) + '</div>' +
      '<div class="date">' + fmtDate(m.release_date) + '</div></div>';
    card.addEventListener('click', function () { openModal(m, trailer); });
    el('grid').appendChild(card);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function openModal(m, trailer) {
    var yr = m.release_date ? m.release_date.slice(0, 4) : '';
    el('modalTitle').innerHTML = escapeHtml(m.title) + (yr ? ' <span class="yr">(' + yr + ')</span>' : '');
    el('ytFrame').src = 'https://www.youtube-nocookie.com/embed/' + trailer.key + '?autoplay=1&rel=0';
    el('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    el('ytFrame').src = '';
    el('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function resetAndLoad() {
    state.page = 0;
    state.done = false;
    state.shown = {};
    el('grid').innerHTML = '';
    el('loadMore').style.display = 'none';
    var g = GENRES.filter(function (x) { return x.id === state.genre; })[0];
    el('sortNote').innerHTML = MOON_SVG + '<span>' + (g && g.id ? g.name : 'All genres') + ' · latest release first · official trailers only</span>';
    loadPage();
  }

  function buildGenreBar() {
    var bar = el('genreBar');
    GENRES.forEach(function (g) {
      var b = document.createElement('button');
      b.className = 'chip' + (g.id === state.genre ? ' active' : '');
      b.textContent = g.name;
      b.addEventListener('click', function () {
        if (state.genre === g.id) return;
        state.genre = g.id;
        Array.prototype.forEach.call(bar.children, function (c) { c.classList.remove('active'); });
        b.classList.add('active');
        resetAndLoad();
      });
      bar.appendChild(b);
    });
    bar.style.display = 'flex';
  }

  el('modalClose').addEventListener('click', closeModal);
  el('modal').addEventListener('click', function (e) { if (e.target === el('modal')) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

  el('loadMore').addEventListener('click', loadPage);

  buildGenreBar();
  resetAndLoad();
})();
</script>
</body>
</html>
